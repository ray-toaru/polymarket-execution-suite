name: rust-locked

on:
  push:
    paths:
      - ".github/workflows/rust-locked.yml"
      - "polymarket-execution-engine"
      - "polymarket-execution-engine/Cargo.toml"
      - "polymarket-execution-engine/Cargo.lock"
      - "polymarket-execution-engine/crates/**"
      - "polymarket-execution-engine/adapters/**"
      - "polymarket-execution-engine/migrations/**"
      - "polymarket-execution-engine/validation/**"
  pull_request:
    paths:
      - ".github/workflows/rust-locked.yml"
      - "polymarket-execution-engine"
      - "polymarket-execution-engine/Cargo.toml"
      - "polymarket-execution-engine/Cargo.lock"
      - "polymarket-execution-engine/crates/**"
      - "polymarket-execution-engine/adapters/**"
      - "polymarket-execution-engine/migrations/**"
      - "polymarket-execution-engine/validation/**"

permissions:
  contents: read

jobs:
  locked-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polymarket-execution-engine
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: polymarket-execution-engine

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run workspace unit tests
        run: cargo test --workspace --exclude pmx-api --locked -- --test-threads=1

      - name: Run fake HTTP e2e tests
        run: cargo test -p pmx-api --test http_and_fake_e2e --locked -- --test-threads=1

      - name: Run official SDK adapter regression tests
        run: cargo test --manifest-path adapters/pmx-official-sdk-adapter/Cargo.toml --locked -- --test-threads=1

      - name: Run official SDK adapter typecheck tests
        run: cargo test --manifest-path adapters/pmx-official-sdk-adapter/Cargo.toml --features sdk-typecheck --locked -- --test-threads=1
