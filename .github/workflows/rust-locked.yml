name: rust-locked

on:
  push:
    paths:
      - "polymarket-execution-engine/Cargo.toml"
      - "polymarket-execution-engine/Cargo.lock"
      - "polymarket-execution-engine/crates/**"
      - "polymarket-execution-engine/adapters/**"
      - "polymarket-execution-engine/migrations/**"
      - "polymarket-execution-engine/validation/**"
      - ".github/workflows/rust-locked.yml"
  pull_request:
    paths:
      - "polymarket-execution-engine/Cargo.toml"
      - "polymarket-execution-engine/Cargo.lock"
      - "polymarket-execution-engine/crates/**"
      - "polymarket-execution-engine/adapters/**"
      - "polymarket-execution-engine/migrations/**"
      - "polymarket-execution-engine/validation/**"
      - ".github/workflows/rust-locked.yml"

jobs:
  locked-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polymarket-execution-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run current gates
        run: ./validation/run_current_gates.sh
