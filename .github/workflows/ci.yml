name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - ".github/**"
      - ".gitmodules"
      - "AGENTS.md"
      - "constraints-ci.txt"
      - "requirements-ci.txt"
      - "scripts/**"
      - "tests/**"
      - "docs/**"
      - "hermes-polymarket-executor-adapter"
      - "hermes-polymarket-executor-adapter/**"
      - "polymarket-execution-engine"
      - "polymarket-execution-engine/**"
      - "VERSION"
      - "README.md"
      - "ROADMAP.md"
      - "TASKS.md"
      - "PROJECT_ARCHITECTURE.md"
      - "COMPONENT_COMPATIBILITY.md"
      - "DEPENDENCY_POLICY.md"
      - "DESIGN_DECISION_RECORD.md"
      - "IMPLEMENTATION_STATUS.md"
      - "CONTROLLED_CANARY_CLOSEOUT.md"
      - "CURRENT_PROGRESS.md"
      - "VALIDATION_REPORT.md"
      - "REVIEW_AUDIT.md"
      - "DEVELOPMENT_HANDOFF.md"
      - "DOC_STATUS.md"
      - "NO_LOCAL_ACTIONS_REMAINING.md"
      - "RELEASE_DECISION.md"
  pull_request:
    paths:
      - ".github/**"
      - ".gitmodules"
      - "AGENTS.md"
      - "constraints-ci.txt"
      - "requirements-ci.txt"
      - "scripts/**"
      - "tests/**"
      - "docs/**"
      - "hermes-polymarket-executor-adapter"
      - "hermes-polymarket-executor-adapter/**"
      - "polymarket-execution-engine"
      - "polymarket-execution-engine/**"
      - "VERSION"
      - "README.md"
      - "ROADMAP.md"
      - "TASKS.md"
      - "PROJECT_ARCHITECTURE.md"
      - "COMPONENT_COMPATIBILITY.md"
      - "DEPENDENCY_POLICY.md"
      - "DESIGN_DECISION_RECORD.md"
      - "IMPLEMENTATION_STATUS.md"
      - "CONTROLLED_CANARY_CLOSEOUT.md"
      - "CURRENT_PROGRESS.md"
      - "VALIDATION_REPORT.md"
      - "REVIEW_AUDIT.md"
      - "DEVELOPMENT_HANDOFF.md"
      - "DOC_STATUS.md"
      - "NO_LOCAL_ACTIONS_REMAINING.md"
      - "RELEASE_DECISION.md"

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HERMES_PROFILE: hm-pdp-test

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  engine-rust-locked:
    name: engine rust locked
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          token: ${{ secrets.CI_SUBMODULE_TOKEN }}
          submodules: recursive
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1
        with:
          workspaces: |
            polymarket-execution-engine
            polymarket-execution-engine/adapters/pmx-official-sdk-adapter
            polymarket-execution-engine/adapters/pmx-official-sdk-spike

      - name: Check engine formatting
        working-directory: polymarket-execution-engine
        run: cargo fmt --all -- --check

      - name: Check engine workspace
        working-directory: polymarket-execution-engine
        run: cargo check --workspace --locked

      - name: Run engine clippy
        working-directory: polymarket-execution-engine
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run engine workspace tests
        working-directory: polymarket-execution-engine
        run: cargo test --workspace --exclude pmx-api --locked -- --test-threads=1

      - name: Run engine fake HTTP e2e tests
        working-directory: polymarket-execution-engine
        run: cargo test -p pmx-api --test http_and_fake_e2e --locked -- --test-threads=1

      - name: Run official SDK spike tests
        working-directory: polymarket-execution-engine
        run: |
          cargo test --manifest-path adapters/pmx-official-sdk-spike/Cargo.toml --locked
          cargo test --manifest-path adapters/pmx-official-sdk-spike/Cargo.toml --features sdk-typecheck --locked

      - name: Run official SDK adapter tests
        working-directory: polymarket-execution-engine
        run: |
          cargo test --manifest-path adapters/pmx-official-sdk-adapter/Cargo.toml --locked
          cargo test --manifest-path adapters/pmx-official-sdk-adapter/Cargo.toml --features sdk-typecheck --locked

  engine-postgres:
    name: engine postgres integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PMX_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          token: ${{ secrets.CI_SUBMODULE_TOKEN }}
          submodules: recursive
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1
        with:
          workspaces: polymarket-execution-engine

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply engine migrations
        working-directory: polymarket-execution-engine
        run: |
          for migration in migrations/[0-9]*.sql; do
            psql "$PMX_TEST_DATABASE_URL" -f "$migration"
          done

      - name: Run engine store PostgreSQL tests
        working-directory: polymarket-execution-engine
        run: cargo test -p pmx-store postgres::postgres_tests --locked -- --nocapture --test-threads=1

      - name: Run engine API PostgreSQL e2e tests
        working-directory: polymarket-execution-engine
        run: cargo test -p pmx-api --test http_postgres_e2e --locked -- --nocapture --test-threads=1

      - name: Run engine migration drift dry-run
        working-directory: polymarket-execution-engine
        run: python validation/run_migration_drift_dry_run.py

  integration-python-compat:
    name: integration python compat
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          token: ${{ secrets.CI_SUBMODULE_TOKEN }}
          submodules: recursive
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install compatibility dependencies
        run: |
          python -m pip install --upgrade pip==25.3
          python -m pip install -c constraints-ci.txt -r requirements-ci.txt
          python -m pip install -c constraints-ci.txt -e "hermes-polymarket-executor-adapter[test]"

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: Run workflow and version regression tests
        run: python -m unittest tests.test_ci_workflows tests.test_version_consistency

      - name: Compile Python surfaces
        run: |
          python -m compileall -q \
            scripts \
            tests \
            hermes-polymarket-executor-adapter/src \
            hermes-polymarket-executor-adapter/tests \
            polymarket-execution-engine/scripts \
            polymarket-execution-engine/validation

  integration-static:
    name: integration release evidence
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          token: ${{ secrets.CI_SUBMODULE_TOKEN }}
          submodules: recursive
          persist-credentials: false

      - name: Checkout pinned Hermes Agent test dependency
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          repository: NousResearch/hermes-agent
          ref: 729a778af0b3f984b4934361cad3050f6afb79ba
          path: hermes-agent

      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Hermes test dependencies
        run: |
          python -m pip install --upgrade pip==25.3
          python -m pip install -c constraints-ci.txt -r requirements-ci.txt
          python -m pip install -c constraints-ci.txt -e "hermes-polymarket-executor-adapter[test]"
          python -m pip install ruff==0.15.15 mypy==2.1.0 bandit==1.9.4

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: Validate root and API contracts
        run: python scripts/validate_contracts.py --report-file dist/contract-validation.report.json

      - name: Run integration Python tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run adapter tests
        env:
          HERMES_AGENT_ROOT: ${{ github.workspace }}/hermes-agent
        run: PYTHONPATH=hermes-polymarket-executor-adapter/src python -m pytest -q hermes-polymarket-executor-adapter/tests

      - name: Run adapter quality and security checks
        run: |
          python -m ruff check hermes-polymarket-executor-adapter/src hermes-polymarket-executor-adapter/tests
          PYTHONPATH=hermes-polymarket-executor-adapter/src python -m mypy hermes-polymarket-executor-adapter/src
          python -m bandit -q -r hermes-polymarket-executor-adapter/src

      - name: Compile integration Python sources
        run: |
          python -m compileall -q \
            scripts \
            tests \
            hermes-polymarket-executor-adapter/src \
            hermes-polymarket-executor-adapter/tests \
            polymarket-execution-engine/scripts \
            polymarket-execution-engine/validation

      - name: Check docs and evidence governance
        run: |
          python scripts/check_docs_links.py
          python polymarket-execution-engine/validation/check_docs_evidence_governance.py

      - name: Clean local artifacts
        run: python scripts/clean_local_artifacts.py

      - name: Check release hygiene
        run: python polymarket-execution-engine/scripts/check_release_hygiene.py . --dev-worktree

      - name: Package and validate release artifact
        id: package_release
        run: |
          artifact="$(python scripts/package_release.py | tail -n 1)"
          python scripts/check_release_artifact.py "$artifact" "$(cat VERSION)"
          cp "$artifact" /tmp/first-release.zip
          first_sha="$(sha256sum "$artifact" | cut -d ' ' -f 1)"
          artifact="$(python scripts/package_release.py | tail -n 1)"
          second_sha="$(sha256sum "$artifact" | cut -d ' ' -f 1)"
          test "$first_sha" = "$second_sha"
          cmp /tmp/first-release.zip "$artifact"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: Upload validation proof artifacts
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: integration-proof-artifacts
          if-no-files-found: error
          path: |
            dist/contract-validation.report.json
            ${{ steps.package_release.outputs.artifact }}
            ${{ steps.package_release.outputs.artifact }}.sha256
            ${{ steps.package_release.outputs.artifact }}.evidence.json
            dist/INDEX.json

      - name: Enforce v0.28 production-live-candidate consistency
        run: python scripts/check_v28_production_live_candidate.py --require-ready
